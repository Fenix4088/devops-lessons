global:
  scrape_interval: 15s      # опрашивать каждые 15 секунд
  evaluation_interval: 15s  # как часто вычислять правила алертов
 
scrape_configs:
  - job_name: 'prometheus'          # сам Prometheus тоже отдаёт метрики
    static_configs:
      - targets: ['localhost:9090']
 
  - job_name: 'node-exporter'       # метрики сервера
    static_configs:
      - targets: ['node-exporter:9100']
 
  - job_name: 'backend'             # метрики приложения
    static_configs:
      - targets: ['backend:3005']   # имя сервиса в docker-сети