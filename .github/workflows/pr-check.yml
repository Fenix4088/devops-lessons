name: PR Checks
 
on:
  pull_request:
    branches: [main]
  workflow_call:
    outputs:
      backend_result:
        value: ${{ jobs.report.outputs.backend_result }}
      test_result:
        value: ${{ jobs.report.outputs.test_result }}
      frontend_result:
        value: ${{ jobs.report.outputs.frontend_result }}
 
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
 
      - name: Install dependencies
        working-directory: backend
        run: npm ci
 
      - name: Run lint
        working-directory: backend
        run: npm run lint
  
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      # -- Built-in setup-node caching (SIMPLER)
    
        # with:
        #   node-version: ${{ matrix.node-version }}
        #   cache: npm
        #   cache-dependency-path: backend/package-lock.json

      - name: Cache node modules
        id: cache
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci
        
      - name: Run tests
        working-directory: backend
        run: npm test
  
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build:production

  report:
    runs-on: ubuntu-latest
    needs: [backend, test, frontend]
    if: always()
    outputs:
      backend_result: ${{ steps.results.outputs.backend_result }}
      test_result: ${{ steps.results.outputs.test_result }}
      frontend_result: ${{ steps.results.outputs.frontend_result }}
    steps:
      - name: Collect check results
        id: results
        run: |
          echo "backend_result=${{ needs.backend.result }}" >> "$GITHUB_OUTPUT"
          echo "test_result=${{ needs.test.result }}" >> "$GITHUB_OUTPUT"
          echo "frontend_result=${{ needs.frontend.result }}" >> "$GITHUB_OUTPUT"

      - name: Fail if checks failed
        if: needs.backend.result != 'success' || needs.test.result != 'success' || needs.frontend.result != 'success'
        run: exit 1