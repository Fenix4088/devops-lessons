name: Deploy
 
on:
  push:
    branches: [main]
 
jobs:
  checks:
    uses: ./.github/workflows/pr-check.yml
 
  build: 
    needs: [checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Build and push frontend and backend images
        env:
          IMAGE_SHA: sha-${{ github.sha }}
          IMAGE_LATEST: latest
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/todo-front:${IMAGE_SHA} \
          -t ${{ secrets.DOCKER_USER }}/todo-front:${IMAGE_LATEST} \ 
          ./frontend

          docker build -t ${{ secrets.DOCKER_USER }}/todo-back:${IMAGE_SHA} \
          -t ${{ secrets.DOCKER_USER }}/todo-back:${IMAGE_LATEST} \ 
          ./backend

          docker push ${{ secrets.DOCKER_USER }}/todo-front:${IMAGE_SHA}
          docker push ${{ secrets.DOCKER_USER }}/todo-front:${IMAGE_LATEST}
          docker push ${{ secrets.DOCKER_USER }}/todo-back:${IMAGE_SHA}
          docker push ${{ secrets.DOCKER_USER }}/todo-back:${IMAGE_LATEST}


