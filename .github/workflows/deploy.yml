name: Deploy
 
on:
  push:
    branches: [main]
 
jobs:
  checks:
    uses: ./.github/workflows/pr-check.yml
 
  build: 
    needs: [checks]
    runs-on: ubuntu-latest
    outputs:
    # експортируем переменную
      image_sha: ${{ steps.build-push.outputs.image_sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        run: docker login -u ${{ vars.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Build and push frontend and backend images
        id: build-push
        env:
          IMAGE_SHA: sha-${{ github.sha }}
          IMAGE_LATEST: latest
        run: |
          docker build \
          --build-arg BUILD_MODE=${{ vars.BUILD_MODE }} \
          --build-arg VITE_NAME=${{ vars.VITE_NAME }} \
          -t ${{ vars.DOCKER_USER }}/lessons-todo-front:${IMAGE_SHA} \
          -t ${{ vars.DOCKER_USER }}/lessons-todo-front:${IMAGE_LATEST} \
          ./frontend

          docker build \
          -t ${{ vars.DOCKER_USER }}/lessons-todo-back:${IMAGE_SHA} \
          -t ${{ vars.DOCKER_USER }}/lessons-todo-back:${IMAGE_LATEST} \
          ./backend

          docker push ${{ vars.DOCKER_USER }}/lessons-todo-front:${IMAGE_SHA}
          docker push ${{ vars.DOCKER_USER }}/lessons-todo-front:${IMAGE_LATEST}
          docker push ${{ vars.DOCKER_USER }}/lessons-todo-back:${IMAGE_SHA}
          docker push ${{ vars.DOCKER_USER }}/lessons-todo-back:${IMAGE_LATEST}
          # Передаём SHA образов в output, чтобы не дублировать в deploy
          echo "image_sha=$IMAGE_SHA" >> "$GITHUB_OUTPUT"

  # deploy:
  #   needs: [build]
  #   runs-on: ubuntu-latest
 
  #   steps:
  #     - name: Deploy via SSH
  #       uses: appleboy/ssh-action@v1.0.3
  #       with:
  #         host: ${{ secrets.SSH_HOST }}
  #         username: ${{ secrets.SSH_USER }}
  #         key: ${{ secrets.SSH_PRIVATE_KEY }}
  #         script: |
  #           cd /var/www/devops-lessons
  #           git pull origin main
  #           cd /var/www/lessons
  #           docker compose up --build -d

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
 
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/devops-lessons
            # Берём имя образа из output предыдущего job'а — не дублируем
            sed -i "s|^DOCKER_IMAGE_FE=.*|DOCKER_IMAGE_FE=${{ vars.DOCKER_USER }}/lessons-todo-front:${{ needs.build.outputs.image_sha }}|" .env
            sed -i "s|^DOCKER_IMAGE_BE=.*|DOCKER_IMAGE_BE=${{ vars.DOCKER_USER }}/lessons-todo-back:${{ needs.build.outputs.image_sha }}|" .env
            docker compose up -d --no-deps backend frontend

  notify:
    if: always()
    needs: [checks, deploy, build]
    uses: ./.github/workflows/notify.yml
    with:
      checks_status: ${{ needs.checks.result }}
      deploy_status: ${{ needs.deploy.result }}
      backend_result: ${{ needs.checks.outputs.backend_result }}
      test_result: ${{ needs.checks.outputs.test_result }}
      frontend_result: ${{ needs.checks.outputs.frontend_result }}
    secrets: inherit
