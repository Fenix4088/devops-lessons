name: Notify
 
on:
  workflow_call:
    inputs:
      checks_status:
        required: true
        type: string
      deploy_status:
        required: true
        type: string
      backend_result:
        required: true
        type: string
      test_result:
        required: true
        type: string
      frontend_result:
        required: true
        type: string
jobs:
  notify:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify about deployment
        run: |
          CHECKS_STATUS="${{ inputs.checks_status }}"
          DEPLOY_STATUS="${{ inputs.deploy_status }}"

          if [ "$CHECKS_STATUS" != "success" ]; then
            TEXT="❌ Checks failed
          ${{ github.repository }} @ ${{ github.ref_name }}

          Backend: ${{ inputs.backend_result }}
          Tests: ${{ inputs.test_result }}
          Frontend: ${{ inputs.frontend_result }}

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$DEPLOY_STATUS" = "success" ]; then
            TEXT="✅ Deploy successful
          ${{ github.repository }} @ ${{ github.ref_name }}

          Backend: ${{ inputs.backend_result }}
          Tests: ${{ inputs.test_result }}
          Frontend: ${{ inputs.frontend_result }}"
          else
            TEXT="❌ Deploy failed
          ${{ github.repository }} @ ${{ github.ref_name }}

          Backend: ${{ inputs.backend_result }}
          Tests: ${{ inputs.test_result }}
          Frontend: ${{ inputs.frontend_result }}

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$TEXT"